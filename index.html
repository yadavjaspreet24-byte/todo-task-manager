<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced To-Do List Manager</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial, sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); padding:20px; }
.container { max-width:1200px; margin:0 auto; background:white; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); padding:20px; }
.header { text-align:center; margin-bottom:20px; }
form { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px; margin-bottom:20px; }
input, select { padding:10px; border-radius:8px; border:1px solid #ccc; }
button.add-btn { grid-column:1/-1; padding:12px; border:none; border-radius:10px; background:#667eea; color:white; cursor:pointer; }

/* Horizontal task boxes */
.tasks-container { display:flex; gap:20px; margin-top:20px; flex-wrap: wrap; }
.tasks-section { flex:1; min-width:300px; background:#f9f9f9; border-radius:15px; padding:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
.tasks-section h2 { margin-bottom:15px; text-align:center; }
.task { border:1px solid #ddd; padding:12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.completed { opacity:0.6; text-decoration:line-through; }
.actions button { margin-left:5px; padding:5px 8px; border:none; border-radius:4px; cursor:pointer; }
.complete { background:#2ecc71; color:white; }
.delete { background:#e74c3c; color:white; }

/* Calendar for monthly selection */
#monthlyCalendar { display:none; grid-column:1/-1; margin-top:10px; }
.calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.calendar-day { padding:8px; text-align:center; border-radius:5px; cursor:pointer; border:1px solid #ccc; }
.calendar-day.selected { background:#667eea; color:white; border-color:#667eea; }
.calendar-day-header { font-weight:bold; }
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>🚀 Task Manager Pro</h1>
<p>Organize your professional & personal tasks with smart scheduling</p>
</div>

<form id="taskForm">
<input type="text" name="taskName" placeholder="Task name" required>
<select name="category">
<option value="professional">Professional</option>
<option value="personal">Personal</option>
</select>
<select name="priority">
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>

<select name="scheduleType" id="scheduleType">
<option value="one-time">One-time</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
</select>

<input type="date" name="taskDate" id="taskDate">

<select name="taskDay" id="taskDay" style="display:none;">
<option value="Sunday">Sunday</option>
<option value="Monday">Monday</option>
<option value="Tuesday">Tuesday</option>
<option value="Wednesday">Wednesday</option>
<option value="Thursday">Thursday</option>
<option value="Friday">Friday</option>
<option value="Saturday">Saturday</option>
</select>

<div id="monthlyCalendar">
<div class="calendar-header">
<button type="button" id="prevMonth">&lt;</button>
<div id="calendarMonthYear"></div>
<button type="button" id="nextMonth">&gt;</button>
</div>
<div class="calendar-grid" id="calendarGrid"></div>
</div>

<select name="taskTime">
<option value="09:00 AM">09:00 AM</option>
<option value="10:00 AM">10:00 AM</option>
<option value="11:00 AM">11:00 AM</option>
<option value="12:00 PM">12:00 PM</option>
<option value="01:00 PM">01:00 PM</option>
<option value="02:00 PM">02:00 PM</option>
<option value="03:00 PM">03:00 PM</option>
<option value="04:00 PM">04:00 PM</option>
<option value="05:00 PM">05:00 PM</option>
<option value="06:00 PM">06:00 PM</option>
</select>

<button class="add-btn">Add Task</button>
</form>

<div class="tasks-container">
<div class="tasks-section">
<h2>One-time Tasks</h2>
<div id="oneTimeTasks"></div>
</div>
<div class="tasks-section">
<h2>Recurring Tasks</h2>
<div id="recurringTasks"></div>
</div>
</div>
</div>

<script>
class TaskManager{
constructor(){
    this.tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    this.tasks = this.tasks.filter(t=>t.taskName && t.taskName.trim()!=="");
    localStorage.setItem("tasks", JSON.stringify(this.tasks));
    this.selectedMonthDates = []; // for monthly
    this.currentMonth = new Date();
    this.init();
}
init(){
    const scheduleSelect = document.getElementById("scheduleType");
    const dateInput = document.getElementById("taskDate");
    const daySelect = document.getElementById("taskDay");
    const calendarDiv = document.getElementById("monthlyCalendar");
    const calendarGrid = document.getElementById("calendarGrid");
    const monthYearLabel = document.getElementById("calendarMonthYear");
    const prevBtn = document.getElementById("prevMonth");
    const nextBtn = document.getElementById("nextMonth");

    // Show/hide fields
    scheduleSelect.addEventListener("change", ()=>{
        const val = scheduleSelect.value;
        dateInput.style.display = val==="one-time" ? "block":"none";
        daySelect.style.display = val==="weekly" ? "block":"none";
        calendarDiv.style.display = val==="monthly" ? "block":"none"; // will render later
        if(val==="monthly") { this.renderCalendar(); calendarDiv.style.display="block"; }
    });

    prevBtn.addEventListener("click", ()=>{ this.changeMonth(-1); });
    nextBtn.addEventListener("click", ()=>{ this.changeMonth(1); });

    document.getElementById("taskForm").addEventListener("submit",(e)=>{
        e.preventDefault();
        this.addTask();
    });

    this.render();
}
// Monthly calendar functions
renderCalendar(){
    const calendarGrid = document.getElementById("calendarGrid");
    const monthYearLabel = document.getElementById("calendarMonthYear");
    const month = this.currentMonth.getMonth();
    const year = this.currentMonth.getFullYear();

    const firstDay = new Date(year,month,1).getDay();
    const daysInMonth = new Date(year,month+1,0).getDate();
    calendarGrid.innerHTML="";

    const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    dayNames.forEach(d=>{
        const div = document.createElement("div");
        div.textContent=d;
        div.className="calendar-day-header";
        calendarGrid.appendChild(div);
    });

    // Empty cells before first day
    for(let i=0;i<firstDay;i++){
        const empty = document.createElement("div");
        calendarGrid.appendChild(empty);
    }

    // Days
    for(let d=1; d<=daysInMonth; d++){
        const dayDiv = document.createElement("div");
        dayDiv.textContent=d;
        dayDiv.className="calendar-day";
        dayDiv.dataset.date=d;
        if(this.selectedMonthDates.includes(d)) dayDiv.classList.add("selected");
        dayDiv.addEventListener("click",()=>{
            const index = this.selectedMonthDates.indexOf(d);
            if(index>-1) this.selectedMonthDates.splice(index,1);
            else this.selectedMonthDates.push(d);
            this.renderCalendar();
        });
        calendarGrid.appendChild(dayDiv);
    }

    monthYearLabel.textContent = `${this.currentMonth.toLocaleString('default',{month:'long'})} ${year}`;
}
changeMonth(offset){
    this.currentMonth.setMonth(this.currentMonth.getMonth()+offset);
    this.renderCalendar();
}
addTask(){
    const data = new FormData(document.getElementById("taskForm"));
    const taskName = data.get("taskName");
    const scheduleType = data.get("scheduleType");
    if(!taskName || taskName.trim()==="") return;

    const task = {
        id: Date.now(),
        taskName: taskName,
        category: data.get("category"),
        priority: data.get("priority"),
        completed:false,
        scheduleType:scheduleType,
        taskTime:data.get("taskTime")
    };

    if(scheduleType==="one-time") task.taskDate = data.get("taskDate");
    else if(scheduleType==="weekly") task.taskDay = data.get("taskDay");
    else if(scheduleType==="monthly") task.taskMonthDates = [...this.selectedMonthDates];

    this.tasks.unshift(task);
    localStorage.setItem("tasks", JSON.stringify(this.tasks));
    document.getElementById("taskForm").reset();
    this.selectedMonthDates=[];
    this.render();
}
deleteTask(id){
    this.tasks = this.tasks.filter(t=>t.id!==id);
    localStorage.setItem("tasks", JSON.stringify(this.tasks));
    this.render();
}
toggleComplete(id){
    const task = this.tasks.find(t=>t.id===id);
    if(task) task.completed = !task.completed;
    localStorage.setItem("tasks", JSON.stringify(this.tasks));
    this.render();
}
render(){
    const oneTimeList = document.getElementById("oneTimeTasks");
    const recurringList = document.getElementById("recurringTasks");

    const oneTimeTasks = this.tasks.filter(t=>t.scheduleType==="one-time");
    const recurringTasks = this.tasks.filter(t=>t.scheduleType!=="one-time");

    oneTimeList.innerHTML = oneTimeTasks.length ? oneTimeTasks.map(t=>`
        <div class="task ${t.completed?"completed":""}">
            <div>
                <strong>${t.taskName}</strong><br>
                ${t.category} | ${t.priority} | ${t.taskDate} | ${t.taskTime}
            </div>
            <div class="actions">
                <button class="complete" onclick="taskManager.toggleComplete(${t.id})">✓</button>
                <button class="delete" onclick="taskManager.deleteTask(${t.id})">🗑</button>
            </div>
        </div>
    `).join("") : "<p>No one-time tasks</p>";

    recurringList.innerHTML = recurringTasks.length ? recurringTasks.map(t=>{
        let scheduleInfo="";
        if(t.scheduleType==="daily") scheduleInfo="Everyday";
        if(t.scheduleType==="weekly") scheduleInfo=`Every ${t.taskDay}`;
        if(t.scheduleType==="monthly") scheduleInfo=`Monthly on days: ${t.taskMonthDates.join(", ")}`;
        return `
        <div class="task ${t.completed?"completed":""}">
            <div>
                <strong>${t.taskName}</strong><br>
                ${t.category} | ${t.priority} | ${scheduleInfo} | ${t.taskTime}
            </div>
            <div class="actions">
                <button class="complete" onclick="taskManager.toggleComplete(${t.id})">✓</button>
                <button class="delete" onclick="taskManager.deleteTask(${t.id})">🗑</button>
            </div>
        </div>
        `;
    }).join("") : "<p>No recurring tasks</p>";
}
}
const taskManager = new TaskManager();
</script>
</body>
</html>
